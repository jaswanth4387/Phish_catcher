<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background: #f1f5f9;
        }

        /* 🔹 Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #0f172a;
            color: white;
            padding-top: 20px;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: #fff;
        }

        /* 🔹 Topbar */
        .topbar {
            margin-left: 240px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h5 {
            margin: 0;
        }

        /* 🔹 Main Content */
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }

        /* 🔹 Card */
        .content-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* 🔹 Hover effect */
        .content-card:hover {
            transform: translateY(-3px);
            transition: 0.3s;
        }
    </style>
</head>

<body>

<!-- 🔹 Sidebar -->
<div class="sidebar">
    <h4>🔐 PhishCatcher</h4>

    <a href="{% url 'Predict_Web_Spoofing_Attack_Type' %}">
        <i class="bi bi-shield-check"></i> Predict Attack
    </a>

    <a href="{% url 'ViewYourProfile' %}">
        <i class="bi bi-person"></i> My Profile
    </a>

    <a href="{% url 'index' %}">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</div>

<!-- 🔹 Topbar -->
<div class="topbar">
    <h5>Dashboard</h5>
    <span>Welcome 👋</span>
</div>

<!-- 🔹 Main Content -->
<div class="main-content">
    <div class="content-card">
        {% block userblock %}
        {% endblock %}
    </div>
</div>

</body>
</html>
