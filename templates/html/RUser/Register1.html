{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - PhishCatcher</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1c1c1c, #2c3e50);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            width: 750px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            color: #fff;
        }

        .form-control, textarea, select {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        textarea {
            resize: none;
        }

        .btn-register {
            border-radius: 30px;
            padding: 10px;
            font-weight: 500;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
        }

        .status {
            text-align: center;
            margin-top: 15px;
            color: #00ffcc;
        }
    </style>
</head>

<body>

<div class="register-card">

    <h3 class="title">📝 Create Your Account</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">

            <div class="col-md-6">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="col-md-6">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <div class="col-md-6">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>

            <div class="col-md-6">
                <input type="number" name="phoneno" class="form-control" placeholder="Mobile Number" required>
            </div>

            <div class="col-md-6">
                <input type="text" name="country" class="form-control" placeholder="Country" required>
            </div>

            <div class="col-md-6">
                <input type="text" name="state" class="form-control" placeholder="State" required>
            </div>

            <div class="col-md-6">
                <input type="text" name="city" class="form-control" placeholder="City" required>
            </div>

            <div class="col-md-6">
                <select name="gender" class="form-control">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="col-12">
                <textarea name="address" class="form-control" rows="2" placeholder="Address"></textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-success w-100 btn-register">
                    Register
                </button>
            </div>

        </div>
    </form>

    <!-- Django Message -->
    <div class="status">
        {{ object }}
    </div>

    <div class="text-center mt-3">
        Already have an account?
        <a href="{% url 'login' %}" class="text-info">Login</a>
    </div>

</div>

</body>
</html>
