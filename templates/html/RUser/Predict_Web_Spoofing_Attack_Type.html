{% extends 'RUser/Header.html' %}
{% block userblock %}

<style>
    .predict-wrapper {
        padding: 20px;
    }

    .predict-card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .predict-card:hover {
        transform: translateY(-3px);
    }

    .result-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        font-weight: bold;
        font-size: 18px;
    }

    .safe {
        background: #dcfce7;
        color: #166534;
    }

    .danger {
        background: #fee2e2;
        color: #991b1b;
    }

    textarea {
        resize: none;
    }
</style>

<div class="predict-wrapper">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="predict-card">

                <h4 class="mb-3">🧠 Phishing Detection System</h4>
                <p class="text-muted">Enter a URL to check whether it is Safe or a Phishing Attack.</p>

                <!-- 🔹 Form -->
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Enter URL</label>
                        <textarea name="url" class="form-control" rows="4" placeholder="https://example.com" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        🔍 Predict Now
                    </button>
                </form>

                <!-- 🔹 Result -->
                {% if objs %}
                    <div class="result-box mt-4 
                        {% if 'Safe' in objs %} safe {% else %} danger {% endif %}">
                        
                        Result: {{ objs }}
                    </div>
                {% endif %}

            </div>

        </div>
    </div>

</div>

{% endblock %}
