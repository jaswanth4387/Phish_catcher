{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
    .chart-wrapper {
        padding: 20px;
    }

    .chart-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .chart-buttons a {
        margin-right: 10px;
        text-decoration: none;
    }

    #chartContainer {
        width: 100%;
        height: 400px;
    }
</style>

<div class="chart-wrapper">

    <div class="chart-card">

        <!-- 🔹 Header -->
        <div class="chart-header">
            <h4>📊 Accuracy Visualization</h4>

            <div class="chart-buttons">
                <a href="{% url 'provider:charts1' 'line' %}" class="btn btn-success btn-sm">Line</a>
                <a href="{% url 'provider:charts1' 'pie' %}" class="btn btn-warning btn-sm">Pie</a>
            </div>
        </div>

        <!-- 🔹 Chart -->
        <div id="chartContainer"></div>

    </div>

</div>

<!-- 🔹 Chart Script -->
<script>
window.onload = function() {

    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        theme: "light2",

        title: {
            text: "Model Accuracy Comparison"
        },

        axisY: {
            title: "Accuracy (%)"
        },

        data: [{
            {% if chart_type == "line" %}
                type: "line",
            {% elif chart_type == "pie" %}
                type: "pie",
            {% else %}
                type: "column",
            {% endif %}

            yValueFormatString: "##0.00\"%\"",
            indexLabel: "{label}: {y}",

            dataPoints: [
                {% for o in form %}
                    { y: {{ o.dcount }}, label: "{{ o.name }}" },
                {% endfor %}
            ]
        }]
    });

    chart.render();
}
</script>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>

{% endblock %}
