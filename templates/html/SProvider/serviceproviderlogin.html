{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Provider Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
        }

        /* 🔹 Left Side (Info Panel) */
        .left-panel {
            width: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .left-panel h2 {
            font-weight: 700;
        }

        /* 🔹 Right Side (Login Form) */
        .right-panel {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
        }

        .login-card {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .login-card h4 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .btn-custom {
            border-radius: 25px;
        }

        .switch-link {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- 🔹 LEFT PANEL -->
<div class="left-panel">
    <h2>🔐 PhishCatcher</h2>
    <p class="mt-3">
        Detect phishing and web spoofing attacks using Machine Learning.
        Secure your system with intelligent analysis.
    </p>
</div>

<!-- 🔹 RIGHT PANEL -->
<div class="right-panel">

    <div class="login-card">

        <h4>Service Provider Login</h4>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-custom">
                Login
            </button>
        </form>

        <div class="switch-link">
            <a href="{% url 'login' %}">👤 Login as User</a>
        </div>

    </div>

</div>

</body>
</html>
