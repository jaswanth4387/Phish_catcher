{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
    .dashboard-wrapper {
        padding: 20px;
    }

    .card-box {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        text-align: center;
        transition: 0.3s;
    }

    .card-box:hover {
        transform: translateY(-5px);
    }

    .card-title {
        font-size: 16px;
        color: #6b7280;
    }

    .card-value {
        font-size: 28px;
        font-weight: bold;
        margin-top: 10px;
    }

    .green { color: #16a34a; }
    .red { color: #dc2626; }
    .blue { color: #2563eb; }
    .purple { color: #7c3aed; }
</style>

<div class="dashboard-wrapper">

    <h4 class="mb-4">📊 Dashboard Overview</h4>

    <div class="row g-4">

        <!-- Total Users -->
        <div class="col-md-3">
            <div class="card-box">
                <div class="card-title">Total Users</div>
                <div class="card-value blue">{{ total_users }}</div>
            </div>
        </div>

        <!-- Total Predictions -->
        <div class="col-md-3">
            <div class="card-box">
                <div class="card-title">Total Predictions</div>
                <div class="card-value purple">{{ total_predictions }}</div>
            </div>
        </div>

        <!-- Safe -->
        <div class="col-md-3">
            <div class="card-box">
                <div class="card-title">Safe URLs</div>
                <div class="card-value green">{{ safe_count }}</div>
            </div>
        </div>

        <!-- Attacks -->
        <div class="col-md-3">
            <div class="card-box">
                <div class="card-title">Phishing Attacks</div>
                <div class="card-value red">{{ attack_count }}</div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
