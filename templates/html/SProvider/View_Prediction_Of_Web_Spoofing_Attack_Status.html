{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
    .results-wrapper {
        padding: 20px;
    }

    .results-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .title {
        font-weight: 600;
        margin-bottom: 20px;
    }

    .table thead {
        background: linear-gradient(90deg, #2563eb, #7c3aed);
        color: white;
    }

    .table tbody tr:hover {
        background: #f1f5f9;
    }

    .badge-safe {
        background: #dcfce7;
        color: #166534;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
    }

    .badge-attack {
        background: #fee2e2;
        color: #991b1b;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
    }
</style>

<div class="results-wrapper">

    <div class="results-card">

        <h4 class="title">🧠 Prediction Results</h4>

        <div class="table-responsive">
            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>URL</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    {% for object in list_objects %}
                    <tr>

                        <td style="word-break: break-all;">
                            {{ object.url }}
                        </td>

                        <td>
                            {% if object.prediction == 'No Phishing Attack' %}
                                <span class="badge-safe">Safe</span>
                            {% else %}
                                <span class="badge-attack">Phishing Attack</span>
                            {% endif %}
                        </td>

                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

{% endblock %}
