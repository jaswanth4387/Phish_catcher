{% extends 'SProvider/Header.html' %}
{% block researchblock %}

<style>
    .ratio-wrapper {
        padding: 20px;
    }

    .ratio-card {
        background: white;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .title {
        font-weight: 600;
        margin-bottom: 20px;
    }

    .table thead {
        background: linear-gradient(90deg, #2563eb, #7c3aed);
        color: white;
    }

    .table tbody tr:hover {
        background: #f1f5f9;
    }

    .badge-safe {
        background: #dcfce7;
        color: #166534;
        padding: 6px 12px;
        border-radius: 20px;
    }

    .badge-attack {
        background: #fee2e2;
        color: #991b1b;
        padding: 6px 12px;
        border-radius: 20px;
    }
</style>

<div class="ratio-wrapper">

    <div class="ratio-card">

        <h4 class="title">⚖️ Attack Ratio Analysis</h4>

        <div class="table-responsive">
            <table class="table table-hover align-middle">

                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Ratio (%)</th>
                    </tr>
                </thead>

                <tbody>
                    {% for object in objs %}
                    <tr>

                        <td>
                            {% if object.name == 'No Attack' %}
                                <span class="badge-safe">Safe Traffic</span>
                            {% else %}
                                <span class="badge-attack">Phishing Attacks</span>
                            {% endif %}
                        </td>

                        <td>
                            <strong>{{ object.ratio|floatformat:2 }}%</strong>
                        </td>

                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </div>

</div>

{% endblock %}
